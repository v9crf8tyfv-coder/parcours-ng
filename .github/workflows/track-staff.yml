name: Track Staff White

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4

      - name: Track staff sessions
        env:
          NATIONSGLORY_API_KEY: ${{ secrets.NATIONSGLORY_API_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: node scripts/track-staff.mjs
